app-id: org.lumovee.Lumovee
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk

command: lumovee

finish-args:
  # Network access for LAN device discovery and UDP control
  - --share=network
  # Display
  - --socket=fallback-x11
  - --socket=wayland
  - --env=QT_QPA_PLATFORM=wayland;xcb
  - --env=QT_QPA_PLATFORMTHEME=xdgdesktopportal
  # System tray support
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  # Persistent settings storage
  - --filesystem=home/.config/Lumovee:create

build-options:
  env:
    PIP_PREFIX: /app
    PIP_DISABLE_PIP_VERSION_CHECK: '1'

modules:
  # ── Python dependencies ────────────────────────────────────────────────────
  # PySide6 is fetched at build time via pip (network access enabled for this
  # module only). Uses the Python 3 bundled with org.freedesktop.Sdk//25.08.
  - name: python3-PySide6
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - python3 -m ensurepip
      - python3 -m pip install PySide6
    sources: []

  # ── Application ────────────────────────────────────────────────────────────
  - name: lumovee
    buildsystem: simple
    build-commands:
      # Install application source
      - install -dm755 /app/lib/lumovee
      - cp src/ui.py /app/lib/lumovee/
      - cp -r src/govee /app/lib/lumovee/
      # Wrapper script so flatpak run resolves the module path correctly
      - |
        install -Dm755 /dev/stdin /app/bin/lumovee << 'EOF'
        #!/bin/sh
        # Locate python3 — prefer the runtime's /usr/bin, fall back to PATH
        PYTHON=/usr/bin/python3
        [ -x "$PYTHON" ] || PYTHON=$(command -v python3 2>/dev/null) || {
            echo "lumovee: python3 not found" >&2
            exit 1
        }
        # Ensure pip-installed packages in /app are on the path
        # Cover both Python minor versions across SDK releases
        for d in /app/lib/python3.*/site-packages; do
            [ -d "$d" ] && PYTHONPATH="$d${PYTHONPATH:+:$PYTHONPATH}"
        done
        export PYTHONPATH
        exec "$PYTHON" /app/lib/lumovee/ui.py "$@"
        EOF
      - install -Dm644 packaging/flatpak/org.lumovee.Lumovee.svg /app/share/icons/hicolor/scalable/apps/org.lumovee.Lumovee.svg
      - install -Dm644 packaging/flatpak/org.lumovee.Lumovee.svg /app/share/app-info/icons/hicolor/scalable/apps/org.lumovee.Lumovee.svg
      - install -Dm644 packaging/flatpak/org.lumovee.Lumovee.desktop /app/share/applications/org.lumovee.Lumovee.desktop
      - install -Dm644 packaging/flatpak/org.lumovee.Lumovee.metainfo.xml /app/share/metainfo/org.lumovee.Lumovee.metainfo.xml
    sources:
      - type: dir
        path: ../..
